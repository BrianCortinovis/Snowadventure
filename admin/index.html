<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Snow Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <img src="/images/homepage_img_0.png" alt="Snow Adventure" class="login-logo">
    <h1>Pannello Admin</h1>
    <form id="login-form">
      <input type="text" id="login-user" placeholder="Username" required>
      <input type="password" id="login-pass" placeholder="Password" required>
      <button type="submit" class="btn-lime">Accedi</button>
      <p id="login-error" class="error" style="display:none"></p>
    </form>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="/images/homepage_img_0.png" alt="Snow Adventure">
    </div>
    <nav class="sidebar-nav">
      <a href="#" data-section="dashboard" class="active"><span class="icon">📊</span> Dashboard</a>
      <a href="#" data-section="calendar"><span class="icon">📅</span> Calendario</a>
      <a href="#" data-section="bookings"><span class="icon">📋</span> Prenotazioni</a>
      <a href="#" data-section="gallery"><span class="icon">🖼️</span> Gallery</a>
      <a href="#" data-section="giftcards"><span class="icon">🎁</span> Gift Cards</a>
      <a href="#" data-section="vouchers"><span class="icon">🏷️</span> Voucher</a>
      <a href="#" data-section="contacts"><span class="icon">✉️</span> Messaggi</a>
      <a href="#" data-section="experiences"><span class="icon">⛷️</span> Esperienze</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/" target="_blank">← Vai al sito</a>
      <a href="#" id="logout-btn">Logout</a>
    </div>
  </aside>

  <main class="main-content">
    <!-- DASHBOARD -->
    <section id="sec-dashboard" class="section active">
      <h2>Dashboard</h2>
      <div class="stats-grid" id="dashboard-stats"></div>
      <h3>Prenotazioni Recenti</h3>
      <div class="table-wrap" id="dashboard-recent"></div>
    </section>

    <!-- CALENDAR -->
    <section id="sec-calendar" class="section">
      <h2>Calendario Disponibilità</h2>
      <div class="toolbar">
        <select id="cal-experience">
          <option value="sunset">Sunset Tour</option>
          <option value="night">Night Tour</option>
          <option value="freeride">Freeride</option>
        </select>
        <input type="month" id="cal-month">
        <button class="btn-lime btn-sm" onclick="loadCalendar()">Carica</button>
        <button class="btn-outline btn-sm" onclick="showAddSlotModal()">+ Aggiungi Slot</button>
        <button class="btn-outline btn-sm" onclick="showBulkSlotModal()">+ Bulk Slots</button>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </section>

    <!-- BOOKINGS -->
    <section id="sec-bookings" class="section">
      <h2>Prenotazioni</h2>
      <div class="toolbar">
        <select id="bookings-status-filter">
          <option value="">Tutti gli stati</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confermato</option>
          <option value="cancelled">Cancellato</option>
          <option value="completed">Completato</option>
          <option value="expired">Scaduto</option>
        </select>
        <select id="bookings-exp-filter">
          <option value="">Tutte le esperienze</option>
          <option value="sunset">Sunset Tour</option>
          <option value="night">Night Tour</option>
          <option value="freeride">Freeride</option>
        </select>
        <button class="btn-lime btn-sm" onclick="loadBookings()">Filtra</button>
      </div>
      <div class="table-wrap" id="bookings-table"></div>
    </section>

    <!-- GALLERY -->
    <section id="sec-gallery" class="section">
      <h2>Gestione Gallery</h2>
      <div class="toolbar">
        <form id="gallery-upload-form" enctype="multipart/form-data" style="display:flex;gap:8px;align-items:center">
          <input type="file" name="image" accept="image/*" required>
          <input type="text" name="altText" placeholder="Testo alternativo" style="width:200px">
          <button type="submit" class="btn-lime btn-sm">Carica</button>
        </form>
      </div>
      <div class="gallery-admin-grid" id="gallery-grid"></div>
    </section>

    <!-- GIFT CARDS -->
    <section id="sec-giftcards" class="section">
      <h2>Gift Cards</h2>
      <div class="table-wrap" id="giftcards-table"></div>
    </section>

    <!-- VOUCHERS -->
    <section id="sec-vouchers" class="section">
      <h2>Voucher / Codici Sconto</h2>
      <div class="toolbar">
        <button class="btn-lime btn-sm" onclick="showCreateVoucherModal()">+ Crea Voucher</button>
      </div>
      <div class="table-wrap" id="vouchers-table"></div>
    </section>

    <!-- CONTACTS -->
    <section id="sec-contacts" class="section">
      <h2>Messaggi</h2>
      <div class="table-wrap" id="contacts-table"></div>
    </section>

    <!-- EXPERIENCES -->
    <section id="sec-experiences" class="section">
      <h2>Esperienze</h2>
      <div class="table-wrap" id="experiences-table"></div>
    </section>
  </main>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button onclick="closeModal()" class="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
